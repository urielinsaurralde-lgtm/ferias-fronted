<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0fdf4;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 480px;
  padding: 15px;
}

/* LOGIN */
.login-box{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.usuario{
  font-size:14px;
  color:#065f46;
}

/* MAPA */
.map-title {
  text-align: center;
  margin: 10px 0;
  color: #065f46;
  font-weight: bold;
}

.map-box {
  height: 250px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  margin-bottom: 15px;
}

#map { height: 100%; }

.pin {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -100%);
  font-size: 28px;
  color: red;
  z-index: 1000;
}

/* FORM */
.form {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* INPUTS BONITOS */
.input-group {
  position: relative;
  margin-bottom: 12px;
}

.input-group i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #10b981;
}

input, select, textarea {
  width: 100%;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #065f46;
  color: white;
  font-size: 16px;
  padding-left: 40px;
}

input, select {
  height: 48px;
}

textarea {
  height: 80px;
  padding: 10px;
  padding-left: 10px;
}

input::placeholder, textarea::placeholder {
  color: #a7f3d0;
}

/* BOTON */
button {
  width: 100%;
  height: 50px;
  border-radius: 8px;
  border: none;
  background: #16a34a;
  color: white;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="login-box">
  <div id="usuario" class="usuario">No logueado</div>

  <div id="g_id_onload"
       data-client_id="TU_CLIENT_ID"
       data-callback="handleCredentialResponse">
  </div>

  <div class="g_id_signin"></div>
</div>

<div class="map-title">📍 Indique su ubicación</div>

<div class="map-box">
  <div id="map"></div>
  <div class="pin"><i class="fa-solid fa-location-dot"></i></div>
</div>

<div class="form">

<div class="input-group">
<i class="fa fa-user"></i>
<input id="nombre" placeholder="Nombre">
</div>

<div class="input-group">
<i class="fa fa-id-card"></i>
<input id="dni" placeholder="DNI">
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input id="email" placeholder="Email">
</div>

<div class="input-group">
<i class="fa fa-barcode"></i>
<input id="renspa" placeholder="RENSPA">
</div>

<!-- 🔥 SELECT BONITO -->
<div class="input-group">
<i class="fa fa-briefcase"></i>
<select id="actividad">
  <option value="">Seleccionar actividad</option>
  <option value="Artesano">Artesano</option>
  <option value="Horticultor">Horticultor</option>
</select>
</div>

<div class="input-group">
<i class="fa fa-camera"></i>
<input type="file" id="foto">
</div>

<textarea id="observaciones" placeholder="Observaciones"></textarea>

<button id="btnEnviar" onclick="enviar()">ENVIAR FORMULARIO</button>

<div class="loader" id="loader">⏳ Enviando...</div>

</div>

</div>

<script>
let usuario=null;

function handleCredentialResponse(response){
  const data=JSON.parse(atob(response.credential.split('.')[1]));
  usuario=data;
  document.getElementById("usuario").innerText="👤 "+data.name;
}

/* MAPA */
let map,lat=-31.73,lng=-60.53;

function iniciarMapa(){
  map=L.map('map').setView([lat,lng],16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

  map.on("move",()=>{
    let c=map.getCenter();
    lat=c.lat;
    lng=c.lng;
  });
}

window.onload=iniciarMapa;

/* ENVIO */
function enviar(){

  if(!usuario){
    alert("Inicie sesión");
    return;
  }

  const boton=document.getElementById("btnEnviar");
  const loader=document.getElementById("loader");

  boton.disabled=true;
  boton.innerText="Enviando...";
  loader.style.display="block";

  let formData=new FormData();

  formData.append("nombre",nombre.value);
  formData.append("dni",dni.value);
  formData.append("email",email.value);
  formData.append("renspa",renspa.value);
  formData.append("actividad",actividad.value);
  formData.append("observaciones",observaciones.value);
  formData.append("lat",lat);
  formData.append("lng",lng);

  let file=foto.files[0];
  if(file){
    formData.append("foto",file);
  }

  fetch("https://api-ferias-da8q.onrender.com/guardar",{
    method:"POST",
    body:formData
  })
  .then(()=>alert("✅ Guardado"))
  .catch(()=>alert("❌ Error"))
  .finally(()=>{
    boton.disabled=false;
    boton.innerText="ENVIAR FORMULARIO";
    loader.style.display="none";
  });
}
</script>

</body>
</html>
