<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* 🔥 TODO TU CSS ORIGINAL (NO MODIFICADO) */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0fdf4;
  width: 100%;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.wrapper { width: 100%; max-width: 480px; padding: 15px; }

.login-box{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.usuario{ font-size:14px; color:#065f46; margin-bottom:5px; }

.map-box { width: 100%; height: 250px; position: relative; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
#map { width: 100%; height: 100%; }

.form { background: white; padding: 20px; border-radius: 15px; }

.input-group { position: relative; margin-bottom: 12px; }

input, textarea {
  width: 100%;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #065f46;
  color: white;
  font-size: 16px;
}

input { height: 48px; padding-left: 40px; }

button {
  width: 100%;
  height: 50px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #16a34a;
  color: white;
  font-weight: bold;
}

</style>
</head>

<body>
<div class="wrapper">

<div class="login-box">
  <div id="usuario">No logueado</div>

  <div id="g_id_onload"
       data-client_id="143500420704-b5pmbegpnaclchkauimjt06e3ehnrkms.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>

  <div class="g_id_signin"></div>
</div>

<div class="map-box">
  <div id="map"></div>
</div>

<div class="form">

<input id="nombre" placeholder="Nombre">
<input id="dni" placeholder="DNI">
<input id="email" placeholder="Email">
<input id="renspa" placeholder="RENSPA">
<input id="actividad" placeholder="Actividad">

<input type="file" id="foto">

<textarea id="observaciones"></textarea>

<button onclick="enviar()">ENVIAR</button>

</div>

</div>

<script>
let usuario=null;

function handleCredentialResponse(response){
  const data=JSON.parse(atob(response.credential.split('.')[1]));
  usuario=data;

  document.getElementById("usuario").innerText="👤 "+data.name;

  fetch("https://api-ferias-da8q.onrender.com/registrar-operador",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      nombre:data.name,
      email:data.email
    })
  });
}

/* MAPA */
let map=L.map('map').setView([-31.73,-60.53],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* ENVIO */
function enviar(){

  if(!usuario){
    alert("Debe iniciar sesión");
    return;
  }

  let formData=new FormData();

  formData.append("nombre", nombre.value);
  formData.append("dni", dni.value);
  formData.append("email", email.value);
  formData.append("renspa", renspa.value);
  formData.append("actividad", actividad.value);
  formData.append("observaciones", observaciones.value);

  formData.append("operador_email", usuario.email);

  let file = document.getElementById("foto").files[0];
  if(file) formData.append("foto", file);

  fetch("https://api-ferias-da8q.onrender.com/guardar",{
    method:"POST",
    body:formData
  })
  .then(()=>alert("✅ Guardado"))
  .catch(()=>alert("❌ Error"));
}
</script>

</body>
</html>
