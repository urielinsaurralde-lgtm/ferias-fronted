<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0fdf4;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 480px;
  padding: 15px;
}

.login-box{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.usuario{
  font-size:14px;
  color:#065f46;
}

.map-title {
  text-align: center;
  margin-bottom: 8px;
  color: #065f46;
}

.map-box {
  height: 250px;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 15px;
}

#map { height: 100%; }

.pin {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -100%);
  font-size: 28px;
  color: red;
  z-index:1000;
}

.map-controls {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index:1001;
  display:flex;
  gap:4px;
}

.map-controls button {
  border:none;
  background:white;
  border-radius:6px;
  cursor:pointer;
}

.gps-btn, .fullscreen-btn {
  position:absolute;
  bottom:8px;
  z-index:1001;
  border:none;
  border-radius:50%;
  width:38px;height:38px;
}

.gps-btn { right:8px; }
.fullscreen-btn { left:8px; }

.form {
  background:white;
  padding:20px;
  border-radius:15px;
}

.input-group {
  position: relative;
  margin-bottom: 12px;
}

.input-group i {
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#10b981;
}

input, textarea {
  width:100%;
  border-radius:8px;
  border:1px solid #ccc;
  background:#065f46;
  color:white;
}

input {
  height:48px;
  padding-left:40px;
}

textarea {
  padding:10px;
  height:80px;
}

input::placeholder, textarea::placeholder {
  color:#a7f3d0;
}

button {
  width:100%;
  height:50px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
}

.loader {
  display:none;
  text-align:center;
}

.chips-container {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip input { display:none; }

.chip span {
  padding:8px 12px;
  border-radius:20px;
  background:#e5e7eb;
}

.chip input:checked + span {
  background:#16a34a;
  color:white;
}

.char-counter{
  font-size:12px;
  text-align:right;
  color:#065f46;
  margin-top:4px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="login-box">
  <div id="usuario">No logueado</div>
  <div id="g_id_onload"
    data-client_id="143500420704-b5pmbegpnaclchkauimjt06e3ehnrkms.apps.googleusercontent.com"
    data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin"></div>
</div>

<div class="map-title">📍 Ubicación</div>

<div class="map-box">
  <div id="map"></div>
  <div class="pin">📍</div>

  <div class="map-controls">
    <button onclick="cambiarCapa('mapa')">🗺️</button>
    <button onclick="cambiarCapa('satelite')">🛰️</button>
    <button onclick="cambiarCapa('google')">🌐</button>
  </div>

  <button class="gps-btn" onclick="irMiUbicacion()">📍</button>
  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
</div>

<div class="form">

<div class="input-group"><i class="fa fa-user"></i><input id="nombre" placeholder="Nombre"></div>
<div class="input-group"><i class="fa fa-id-card"></i><input id="dni"></div>
<div class="input-group"><i class="fa fa-envelope"></i><input id="email"></div>
<div class="input-group"><i class="fa fa-barcode"></i><input id="renspa"></div>

<!-- ACTIVIDAD -->
<div class="input-group">
  <i class="fa fa-briefcase"></i>
  <div class="chips-container" style="padding-left:40px;">
    <label class="chip">
      <input type="checkbox" name="actividad" value="Artesano">
      <span>Artesano</span>
    </label>
    <label class="chip">
      <input type="checkbox" name="actividad" value="Horticultor">
      <span>Horticultor</span>
    </label>
  </div>
</div>

<div class="input-group"><i class="fa fa-camera"></i><input type="file" id="foto"></div>

<div class="chips-container">
<label class="chip"><input type="checkbox" name="feria" value="Feria 1"><span>Feria 1</span></label>
<label class="chip"><input type="checkbox" name="feria" value="Feria 2"><span>Feria 2</span></label>
</div>

<textarea id="observaciones" maxlength="140" placeholder="Observaciones"></textarea>
<div class="char-counter" id="contador">0 / 140</div>

<button id="btnEnviar" onclick="enviar()">ENVIAR</button>
<div class="loader" id="loader">⏳ Enviando...</div>

</div>
</div>

<script>
let usuario=null;

function handleCredentialResponse(response){
  const data=JSON.parse(atob(response.credential.split('.')[1]));
  usuario=data;
  document.getElementById("usuario").innerText=data.name;
}

let map,lat=-31.73,lng=-60.53,capaActual,capas={};

function iniciarMapa(){
  map=L.map('map').setView([lat,lng],16);

  const mapa=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
  const satelite=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
  const google=L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}');

  capas={mapa,satelite,google};
  capaActual=google;
  capaActual.addTo(map);

  map.on("move",()=>{
    let c=map.getCenter();
    lat=c.lat;
    lng=c.lng;
  });
}

function cambiarCapa(tipo){
  if(capaActual) map.removeLayer(capaActual);
  capaActual=capas[tipo];
  capaActual.addTo(map);
}

function irMiUbicacion(){
  navigator.geolocation.getCurrentPosition(p=>{
    lat=p.coords.latitude;
    lng=p.coords.longitude;
    map.setView([lat,lng],17);
  });
}

function toggleFullscreen(){
  document.querySelector(".map-box").classList.toggle("fullscreen");
}

window.onload=iniciarMapa;

// CONTADOR
const obs=document.getElementById("observaciones");
const contador=document.getElementById("contador");

obs.addEventListener("input",()=>{
  contador.innerText=obs.value.length+" / 140";
});

// ENVIO
function enviar(){
  const boton=document.getElementById("btnEnviar");
  const loader=document.getElementById("loader");

  boton.disabled=true;
  loader.style.display="block";

  let actividades=[];
  document.querySelectorAll('input[name="actividad"]:checked')
  .forEach(c=>actividades.push(c.value));

  console.log("Actividad:",actividades);

  setTimeout(()=>{
    boton.disabled=false;
    loader.style.display="none";
    alert("Enviado (demo)");
  },1000);
}
</script>

</body>
</html>
